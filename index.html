<!DOCTYPE html>
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brat generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
    text-transform: lowercase;
}

body{
    height:100vh;
    overflow:hidden;
    background:#b9ff00;
    transition: background 0.3s ease;
}

/* 🎨 TOP BAR */
.top{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

.color, .toggle{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid black;
    cursor:pointer;
    position:relative;
}

/* 🧠 CENTER */
.center{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.square{
    width:450px;
    height:450px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.preview{
    font-size:45px;
    letter-spacing:2px;
    transition: filter 0.3s ease;
}

/* ✏️ INPUT */
.input-box{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
}

input{
    width:600px;
    padding:16px;
    border-radius:30px;
    border:2px solid black;
    font-size:18px;
    text-align:center;
    outline:none;
}

input:focus{
    background:black;
    color:#b9ff00;
}

/* ❌ BARRE (flou OFF visuel) */
.cross::after{
    content:"";
    position:absolute;
    width:100%;
    height:2px;
    background:black;
    top:50%;
    left:0;
    transform:rotate(45deg);
}
</style>

</head>

<body>

<!-- 🎨 COLORS -->
<div class="top">

    <div class="color" style="background:white" onclick="changeColor('white')"></div>
    <div class="color" style="background:#ffb6d9" onclick="changeColor('#ffb6d9')"></div>
    <div class="color" style="background:#ffe600" onclick="changeColor('#ffe600')"></div>
    <div class="color" style="background:#00c853" onclick="changeColor('#00c853')"></div>
    <div class="color" style="background:#0057ff" onclick="changeColor('#0057ff')"></div>

    <!-- 🎛 FLU BUTTON -->
    <div id="blurBtn" class="toggle" style="background:black" onclick="toggleBlur()"></div>

</div>

<!-- 🧠 TEXT -->
<div class="center">
    <div class="square">
        <div class="preview" id="text">
            you seem pretty sad for a girl so in love
        </div>
    </div>
</div>

<!-- ✏️ INPUT -->
<div class="input-box">
<input 
id="input"
value="you seem pretty sad for a girl so in love"
oninput="updateText()">
</div>

<script>

let blurEnabled = true;

function updateText(){
    let value = document.getElementById("input").value;
    document.getElementById("text").innerText = value.toLowerCase();
}

/* 🎨 COULEURS */
function changeColor(color){
    document.body.style.background = color;
}

/* 🌫 FLU TOGGLE */
function toggleBlur(){
    blurEnabled = !blurEnabled;

    const btn = document.getElementById("blurBtn");
    const text = document.getElementById("text");

    if(blurEnabled){
        text.style.filter = "blur(1px)";
        btn.classList.remove("cross");
    } else {
        text.style.filter = "blur(0px)";
        btn.classList.add("cross");
    }
}

/* état initial */
document.getElementById("text").style.filter = "blur(1px)";
</script>

</body>
</html>
