<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brat quotes</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
    text-transform: lowercase;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#b9ff00;
    transition: background 0.3s ease;
}

/* 💚 citation centrale */
.quote{
    font-size:80px;
    text-align:center;
    max-width:900px;
    letter-spacing:2px;
    cursor:pointer;
    user-select:none;
    padding:20px;
}
</style>

</head>

<body>

<div class="quote" id="quote" onclick="newQuote()">
    click for brat energy
</div>

<script>

// 💥 citations BRAT style pinterest
const quotes = [
    "i’m not like you",
    "don’t text me",
    "i said what i said",
    "stay mad",
    "i do what i want",
    "you wouldn’t get it",
    "i’m the problem",
    "whatever helps you sleep",
    "brat summer forever",
    "not your type",
    "leave me alone",
    "i don’t care anymore",
    "main character energy",
    "too loud to care",
    "chaos looks good on me"
];

function newQuote(){
    const q = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById("quote").innerText = q;

    // petit bonus vibe pinterest
    const colors = ["#b9ff00","#ffb6d9","#ffe600","#00c853","#0057ff","#ff8c00"];
    document.body.style.background = colors[Math.floor(Math.random() * colors.length)];
}

// première phrase random au chargement
newQuote();

</script>

</body>
</html>
