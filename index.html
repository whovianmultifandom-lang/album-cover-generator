<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brat generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
    text-transform: lowercase;
}

body{
    height:100vh;
    overflow:hidden;
    background:#b9ff00;
    transition: background 0.3s ease;
}

/* 🎨 TOP */
.top{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

/* couleurs */
.color{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid black;
    cursor:pointer;
}

/* noir avec texte blanc */
.color.black{
    background:black;
}

/* 🧠 CENTER */
.center{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.square{
    width:450px;
    height:450px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.preview{
    font-size:45px;
    letter-spacing:2px;
    transition: filter 0.3s ease;
}

/* ✏️ INPUT */
.input-box{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
}

input{
    width:600px;
    padding:16px;
    border-radius:30px;
    border:2px solid black;
    font-size:18px;
    text-align:center;
    outline:none;
}

input:focus{
    background:black;
    color:#b9ff00;
}

/* 🎛 BLUR BUTTON */
.toggle-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

/* bouton rond */
.toggle{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid black;
    cursor:pointer;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:14px;
}

/* A flouté */
.blur-letter{
    filter: blur(2px);
}

/* texte sous bouton */
.label{
    font-size:10px;
}
</style>

</head>

<body>

<!-- 🎨 COLORS -->
<div class="top">

    <div class="color" style="background:white" onclick="changeColor('white')"></div>
    <div class="color" style="background:#ffb6d9" onclick="changeColor('#ffb6d9')"></div>
    <div class="color" style="background:#ffe600" onclick="changeColor('#ffe600')"></div>
    <div class="color" style="background:#00c853" onclick="changeColor('#00c853')"></div>
    <div class="color" style="background:#0057ff" onclick="changeColor('#0057ff')"></div>

    <!-- ⚫ NOIR -->
    <div class="color black" onclick="changeColor('black')"></div>

    <!-- 🌫 BLUR -->
    <div class="toggle-wrapper">
        <div id="blurBtn" class="toggle" onclick="toggleBlur()">
            <span class="blur-letter">A</span>
        </div>
        <div class="label">blur</div>
    </div>

</div>

<!-- 🧠 TEXT -->
<div class="center">
    <div class="square">
        <div class="preview" id="text">
            you seem pretty sad for a girl so in love
        </div>
    </div>
</div>

<!-- ✏️ INPUT -->
<div class="input-box">
<input 
id="input"
value="you seem pretty sad for a girl so in love"
oninput="updateText()">
</div>

<script>

let blurEnabled = true;

function updateText(){
    let value = document.getElementById("input").value;
    document.getElementById("text").innerText = value.toLowerCase();
}

function changeColor(color){
    document.body.style.background = color;
}

/* 🌫 TOGGLE BLUR */
function toggleBlur(){
    blurEnabled = !blurEnabled;

    const text = document.getElementById("text");

    if(blurEnabled){
        text.style.filter = "blur(1px)";
    } else {
        text.style.filter = "blur(0px)";
    }
}

/* état initial */
document.getElementById("text").style.filter = "blur(1px");

</script>

</body>
</html>
