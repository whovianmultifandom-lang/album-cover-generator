<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brat generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
    text-transform: lowercase;
}

body{
    height:100vh;
    overflow:hidden;
    background:#b9ff00;
}

/* 🎨 TOP */
.top{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

/* couleurs rapides */
.color{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid black;
    cursor:pointer;
}

.black{ background:black; }

/* 🧠 CENTRE */
.center{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.square{
    width:450px;
    height:450px;
    display:flex;
    justify-content:center;
    align-items:center;
}

#text{
    font-size:45px;
    letter-spacing:2px;
}

/* ✏️ INPUT */
.input-box{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
}

input[type="text"]{
    width:600px;
    padding:16px;
    border-radius:30px;
    border:2px solid black;
    font-size:18px;
    text-align:center;
}

input[type="text"]:focus{
    background:black;
    color:#b9ff00;
}

/* 🌫 BLUR */
.blur-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

.blur-btn{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid black;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.blur-letter{
    filter: blur(2px);
}

.label{
    font-size:10px;
}

/* 🎛 COLOR PICKERS */
.pickers{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:flex-end;
}

.pickers label{
    font-size:10px;
}
</style>

</head>

<body>

<!-- 🎨 COLORS QUICK -->
<div class="top">

    <div class="color" style="background:white" onclick="changeColor('white')"></div>
    <div class="color" style="background:#ffb6d9" onclick="changeColor('#ffb6d9')"></div>
    <div class="color" style="background:#ffe600" onclick="changeColor('#ffe600')"></div>
    <div class="color" style="background:#00c853" onclick="changeColor('#00c853')"></div>
    <div class="color" style="background:#0057ff" onclick="changeColor('#0057ff')"></div>
    <div class="color black" onclick="changeColor('black')"></div>

    <!-- 🌫 BLUR -->
    <div class="blur-wrapper">
        <div class="blur-btn" onclick="toggleBlur()">
            <span class="blur-letter">A</span>
        </div>
        <div class="label">blur</div>
    </div>

</div>

<!-- 🎛 COLOR PICKERS -->
<div class="pickers">

    <div>
        <label>text</label><br>
        <input type="color" oninput="setTextColor(this.value)">
    </div>

    <div>
        <label>background</label><br>
        <input type="color" oninput="setBgColor(this.value)">
    </div>

</div>

<!-- 🧠 TEXT -->
<div class="center">
    <div class="square">
        <div id="text">
            you seem pretty sad for a girl so in love
        </div>
    </div>
</div>

<!-- ✏️ INPUT -->
<div class="input-box">
<input type="text" id="input"
value="you seem pretty sad for a girl so in love"
oninput="updateText()">
</div>

<script>

let blurOn = false;

/* texte */
function updateText(){
    let v = document.getElementById("input").value;
    document.getElementById("text").innerText = v.toLowerCase();
}

/* couleurs rapides */
function changeColor(c){
    document.body.style.background = c;
}

/* blur */
function toggleBlur(){
    blurOn = !blurOn;
    document.getElementById("text").style.filter =
        blurOn ? "blur(1.2px)" : "blur(0px)";
}

/* 🎨 pickers */
function setTextColor(c){
    document.getElementById("text").style.color = c;
}

function setBgColor(c){
    document.body.style.background = c;
}

</script>

</body>
</html>
